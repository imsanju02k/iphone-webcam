<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone WebCam – OBS Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: contain; display: block; }
    #overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; font-family: -apple-system, sans-serif; color: #475569;
      text-align: center; padding: 32px; transition: opacity 0.5s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .spin {
      width: 48px; height: 48px;
      border: 3px solid #1e293b; border-top-color: #6366f1;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay h2 { font-size: 1rem; color: #64748b; }
    #overlay p  { font-size: 0.8rem; color: #334155; }
  </style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="overlay">
  <div class="spin"></div>
  <h2>Waiting for iPhone camera…</h2>
  <p>Open camera.html on your iPhone and tap<br/><strong style="color:#64748b">Start Streaming</strong></p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const ROOM_ID = 'main';
  const socket  = io(); // connects to HTTP socket.io (same origin: http://IP:3000)

  const video   = document.getElementById('video');
  const overlay = document.getElementById('overlay');

  let peer        = null;
  let cameraId    = null; // socket.id of the camera — needed for ICE routing

  function showStream(stream) { video.srcObject = stream; overlay.classList.add('hidden'); }
  function showWaiting()      { video.srcObject = null;   overlay.classList.remove('hidden'); }

  function makePeer() {
    if (peer) { peer.close(); peer = null; }

    peer = new RTCPeerConnection({
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    });

    peer.ontrack = (e) => showStream(e.streams[0]);

    peer.onicecandidate = ({ candidate }) => {
      if (candidate && cameraId) {
        // Route ICE to camera's specific socket ID
        socket.emit('webrtc:ice', { roomId: ROOM_ID, toId: cameraId, candidate });
      }
    };

    peer.onconnectionstatechange = () => {
      if (peer.connectionState === 'failed' || peer.connectionState === 'disconnected') {
        showWaiting();
      }
    };
  }

  function rejoin() { socket.emit('viewer:join', { roomId: ROOM_ID }); }

  // Camera is available — get ready to receive offer
  socket.on('viewer:camera_ready', () => {
    console.log('[Viewer] Camera ready, waiting for offer');
    makePeer();
  });

  // Receive SDP offer from camera (includes camera's socket id)
  socket.on('webrtc:offer', async ({ offer, fromCameraId }) => {
    cameraId = fromCameraId;
    console.log('[Viewer] Got offer from', cameraId);
    if (!peer) makePeer();

    await peer.setRemoteDescription(offer);
    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    // Answer goes back to server; server routes to camera by socket.id
    socket.emit('webrtc:answer', { roomId: ROOM_ID, answer });
  });

  // ICE from camera
  socket.on('webrtc:ice', ({ candidate }) => {
    peer?.addIceCandidate(candidate).catch(() => {});
  });

  // Camera disconnected
  socket.on('peer:disconnected', () => {
    peer?.close(); peer = null; cameraId = null;
    showWaiting();
    rejoin();
  });

  socket.on('connect',    () => rejoin());
  socket.on('disconnect', () => showWaiting());

  rejoin();
</script>
</body>
</html>
