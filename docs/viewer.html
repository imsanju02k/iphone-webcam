<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone WebCam – Viewer</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }

    #video {
      width:100%; height:100%;
      object-fit:contain; /* preserves 16:9 or 9:16 exactly as sent */
      display:block; background:#000;
    }

    #overlay {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; transition:opacity 0.5s;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }

    .spin {
      width:48px; height:48px;
      border:3px solid #1e293b; border-top-color:#6366f1;
      border-radius:50%; animation:spin 1s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    #overlay h2 {
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:0.95rem; font-weight:500; color:#475569;
    }
    #overlay p {
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:0.78rem; color:#334155; text-align:center; line-height:1.6;
    }
    #overlay p strong { color:#64748b; }
    #retryBadge {
      font-family:monospace; font-size:0.72rem; color:#1e293b;
      background:#0f172a; padding:4px 12px; border-radius:6px;
      border:1px solid #1e293b;
    }
  </style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="overlay">
  <div class="spin"></div>
  <h2 id="overlayTitle">Waiting for camera…</h2>
  <p>Open <strong>camera.html</strong> on iPhone<br/>then tap <strong>Start Streaming</strong></p>
  <div id="retryBadge">connecting…</div>
</div>

<script>
  // ── Session ────────────────────────────────────────────────────────────────
  const params    = new URLSearchParams(location.search);
  const sessionId = params.get('s');

  if (!sessionId) {
    document.getElementById('overlayTitle').textContent = 'No session ID';
    document.getElementById('overlay').querySelector('p').textContent =
      'Open this page via the control panel OBS URL.';
  } else {
    startViewer();
  }

  // ── BroadcastChannel: notify control panel ─────────────────────────────────
  let bc = null;
  try { bc = new BroadcastChannel('ipcam-status'); } catch(_) {}

  const CAMERA_PEER_ID = `ipcam-${sessionId}`;
  const PEER_CFG = {
    host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    }
  };

  let viewerPeer  = null;
  let dataConn    = null;
  let activeCall  = null;
  let retryTimer  = null;
  let retryCount  = 0;

  function startViewer() {
    viewerPeer = new Peer(PEER_CFG); // random ID assigned by PeerJS

    viewerPeer.on('open', () => {
      console.log('[Viewer] Peer ready:', viewerPeer.id);
      connectToCamera();
    });

    // Camera will CALL us with the stream
    viewerPeer.on('call', (call) => {
      clearTimeout(retryTimer);
      activeCall = call;

      call.answer(); // viewer answers without providing a stream (one-way)

      call.on('stream', (remoteStream) => {
        document.getElementById('video').srcObject = remoteStream;
        document.getElementById('overlay').classList.add('hidden');
        bc?.postMessage('live');
        retryCount = 0;
        console.log('[Viewer] Stream received');
      });

      call.on('close', () => {
        showWaiting('Camera disconnected…');
        bc?.postMessage('waiting');
        activeCall = null;
        retryTimer = setTimeout(connectToCamera, 2000);
      });

      call.on('error', (err) => {
        console.warn('[Viewer] Call error:', err);
        showWaiting('Stream error, reconnecting…');
        activeCall = null;
        retryTimer = setTimeout(connectToCamera, 2000);
      });
    });

    viewerPeer.on('error', (err) => {
      console.warn('[Viewer] Peer error:', err.type);
      showWaiting(`Error: ${err.type}`);
      retryTimer = setTimeout(() => {
        viewerPeer?.destroy();
        startViewer();
      }, 4000);
    });

    viewerPeer.on('disconnected', () => {
      showWaiting('Disconnected…');
      viewerPeer.reconnect();
    });
  }

  function connectToCamera() {
    clearTimeout(retryTimer);
    if (!viewerPeer || viewerPeer.destroyed) { startViewer(); return; }

    retryCount++;
    setRetryBadge();
    console.log(`[Viewer] Connecting to camera (attempt ${retryCount})`);
    document.getElementById('overlayTitle').textContent = 'Waiting for camera…';

    // Data connection signals camera that a viewer wants the stream
    dataConn?.close();
    try {
      dataConn = viewerPeer.connect(CAMERA_PEER_ID, { reliable: false });
    } catch(e) {
      retryTimer = setTimeout(connectToCamera, 3000); return;
    }

    dataConn.on('error', () => {
      dataConn = null;
      retryTimer = setTimeout(connectToCamera, 3000);
    });

    dataConn.on('close', () => {
      if (!activeCall) {
        dataConn = null;
        retryTimer = setTimeout(connectToCamera, 3000);
      }
    });

    // If camera doesn't call us back in 8 s, retry
    retryTimer = setTimeout(() => {
      if (!activeCall) {
        console.log('[Viewer] No call received, retrying…');
        connectToCamera();
      }
    }, 8000);
  }

  function showWaiting(msg) {
    document.getElementById('video').srcObject = null;
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('overlayTitle').textContent = msg || 'Waiting for camera…';
  }

  function setRetryBadge() {
    document.getElementById('retryBadge').textContent =
      retryCount === 1 ? 'connecting…' : `retry #${retryCount}`;
  }
</script>
</body>
</html>
