<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone WebCam – Viewer</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }

    #video {
      width:100%; height:100%;
      object-fit:contain;
      display:block; background:#000;
    }

    #overlay {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; transition:opacity 0.5s;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }

    .spin {
      width:48px; height:48px;
      border:3px solid #1e293b; border-top-color:#6366f1;
      border-radius:50%; animation:spin 1s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    #overlay h2 {
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:0.95rem; font-weight:500; color:#475569;
    }
    #overlay p {
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:0.78rem; color:#334155; text-align:center; line-height:1.6; max-width:280px;
    }
    #overlay p strong { color:#64748b; }
    #retryBadge {
      font-family:monospace; font-size:0.72rem; color:#1e293b;
      background:#0f172a; padding:4px 12px; border-radius:6px;
      border:1px solid #1e293b;
    }
  </style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="overlay">
  <div class="spin"></div>
  <h2 id="overlayTitle">Waiting for camera…</h2>
  <p>Open <strong>camera.html</strong> on iPhone<br/>then tap <strong>Start Streaming</strong></p>
  <div id="retryBadge">connecting…</div>
</div>

<script>
  const params    = new URLSearchParams(location.search);
  const sessionId = params.get('s');
  const CAMERA_PEER_ID = `ipcam-${sessionId}`;

  const PEER_CFG = {
    host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
      ]
    }
  };

  let bc = null;
  try { bc = new BroadcastChannel('ipcam-status'); } catch(_) {}

  let viewerPeer  = null;
  let activeCall  = null;
  let retryTimer  = null;
  let retryCount  = 0;

  if (!sessionId) {
    document.getElementById('overlayTitle').textContent = 'No session ID';
    document.getElementById('overlay').querySelector('p').textContent =
      'Open this page from the control panel OBS URL.';
  } else {
    startViewer();
  }

  function startViewer() {
    if (viewerPeer && !viewerPeer.destroyed) viewerPeer.destroy();
    viewerPeer = new Peer(PEER_CFG); // random ID — viewer doesn't need fixed ID

    viewerPeer.on('open', () => {
      console.log('[Viewer] Peer ready:', viewerPeer.id);
      callCamera();
    });

    viewerPeer.on('error', (err) => {
      console.warn('[Viewer] Peer error:', err.type);
      showWaiting(`Error (${err.type}), retrying…`);
      retryTimer = setTimeout(startViewer, 4000);
    });

    viewerPeer.on('disconnected', () => {
      showWaiting('Reconnecting…');
      setTimeout(() => { viewerPeer?.reconnect(); }, 2000);
    });
  }

  // ── KEY CHANGE: viewer CALLS the camera (camera answers with its stream) ──
  // We provide a minimal empty canvas stream so WebRTC can initiate a connection.
  // The camera answers with its live camera stream.
  function createEmptyStream() {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = 2; canvas.height = 2;
      const ctx = canvas.getContext('2d');
      ctx.fillRect(0, 0, 2, 2); // tiny black frame
      return canvas.captureStream(1); // 1 fps, minimal overhead
    } catch(e) {
      // Fallback: silent AudioContext stream (for browsers blocking captureStream)
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const dest = ac.createMediaStreamDestination();
        return dest.stream;
      } catch(_) {
        return null;
      }
    }
  }

  function callCamera() {
    clearTimeout(retryTimer);
    activeCall?.close();
    activeCall = null;

    if (!viewerPeer || viewerPeer.destroyed) { startViewer(); return; }

    retryCount++;
    setRetryBadge();
    document.getElementById('overlayTitle').textContent = 'Waiting for camera…';
    console.log(`[Viewer] Calling camera (attempt ${retryCount})`);

    const emptyStream = createEmptyStream();
    if (!emptyStream) {
      // If we can't create empty stream, retry later
      retryTimer = setTimeout(callCamera, 3000); return;
    }

    try {
      activeCall = viewerPeer.call(CAMERA_PEER_ID, emptyStream, {
        // No specific constraints — camera side controls resolution
      });
    } catch(e) {
      console.warn('[Viewer] call() error:', e);
      retryTimer = setTimeout(callCamera, 3000); return;
    }

    if (!activeCall) {
      retryTimer = setTimeout(callCamera, 3000); return;
    }

    activeCall.on('stream', (remoteStream) => {
      console.log('[Viewer] Stream received! Tracks:', remoteStream.getTracks().length);
      const vid = document.getElementById('video');
      vid.srcObject = remoteStream;
      vid.play().catch(() => {});
      document.getElementById('overlay').classList.add('hidden');
      bc?.postMessage({ type: 'live' });
      retryCount = 0;
    });

    activeCall.on('close', () => {
      console.log('[Viewer] Call closed');
      showWaiting('Camera stopped…');
      bc?.postMessage({ type: 'waiting' });
      activeCall = null;
      retryTimer = setTimeout(callCamera, 2000);
    });

    activeCall.on('error', (err) => {
      console.warn('[Viewer] Call error:', err);
      showWaiting('Stream error, retrying…');
      activeCall = null;
      retryTimer = setTimeout(callCamera, 3000);
    });

    // Camera hasn't answered in 12s → it might not be streaming yet, retry
    // (Camera buffers our call and answers when user taps Start Streaming)
    retryTimer = setTimeout(() => {
      const vid = document.getElementById('video');
      if (!vid.srcObject || vid.srcObject.getTracks().length === 0) {
        console.log('[Viewer] No stream in 12s, retrying call…');
        callCamera();
      }
    }, 12000);
  }

  function showWaiting(msg) {
    document.getElementById('video').srcObject = null;
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('overlayTitle').textContent = msg || 'Waiting for camera…';
  }

  function setRetryBadge() {
    document.getElementById('retryBadge').textContent =
      retryCount <= 1 ? 'connecting…' : `retry #${retryCount}`;
  }
</script>
</body>
</html>
