<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone WebCam – Viewer</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }

    #video {
      width:100%; height:100%;
      object-fit:contain;
      display:block; background:#000;
    }

    #overlay {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; transition:opacity 0.5s;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }

    .spin {
      width:48px; height:48px;
      border:3px solid #1e293b; border-top-color:#6366f1;
      border-radius:50%; animation:spin 1s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    #overlay h2 {
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:1rem; font-weight:500; color:#475569;
    }
    #overlay p {
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:0.78rem; color:#334155; text-align:center;
      line-height:1.6; max-width:280px;
    }
    #overlay p strong { color:#64748b; }
    #statusBadge {
      font-family:monospace; font-size:0.72rem; color:#1e293b;
      background:#0f172a; padding:4px 12px; border-radius:6px;
      border:1px solid #1e293b;
    }
  </style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="overlay">
  <div class="spin"></div>
  <h2 id="overlayTitle">Waiting for camera…</h2>
  <p>Tap <strong>Start Streaming</strong> on iPhone<br/>and make sure this viewer URL has <strong>?s=</strong> param</p>
  <div id="statusBadge">connecting…</div>
</div>

<script>
  const params    = new URLSearchParams(location.search);
  const sessionId = params.get('s');

  if (!sessionId) {
    document.getElementById('overlayTitle').textContent = 'No session ID';
    document.getElementById('overlay').querySelector('p').innerHTML =
      'Add <strong>?s=SESSION_ID</strong> to this URL.<br/>Copy the OBS URL from the control panel.';
    document.getElementById('statusBadge').textContent = 'missing ?s= param';
  } else {
    startViewer();
  }

  // ── Peer ID ────────────────────────────────────────────────────────────────
  // Viewer registers as "ipcam-v-{sessionId}" — camera calls this fixed ID.
  // Viewer NEVER needs to provide a stream — just answer and receive.
  // This works perfectly in OBS Browser Source (no canvas.captureStream needed).
  const VIEWER_PEER_ID = `ipcam-v-${sessionId}`;

  const PEER_CFG = {
    host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
      ]
    }
  };

  let bc = null;
  try { bc = new BroadcastChannel('ipcam-status'); } catch(_) {}

  let viewerPeer  = null;
  let activeCall  = null;
  let retryTimer  = null;
  let retryCount  = 0;

  function startViewer() {
    if (viewerPeer && !viewerPeer.destroyed) viewerPeer.destroy();

    viewerPeer = new Peer(VIEWER_PEER_ID, PEER_CFG);

    viewerPeer.on('open', () => {
      retryCount = 0;
      setStatus('Waiting for camera…', 'ready');
      console.log('[Viewer] Registered as:', VIEWER_PEER_ID);
    });

    // ── Camera calls viewer with its stream ───────────────────────────────
    // All viewer has to do: answer (no stream from viewer side) → receive camera stream
    viewerPeer.on('call', (call) => {
      clearTimeout(retryTimer);
      console.log('[Viewer] Incoming call from camera');

      if (activeCall) activeCall.close();
      activeCall = call;

      // Answer without providing any stream — camera sends us its stream
      call.answer();

      call.on('stream', (remoteStream) => {
        console.log('[Viewer] Stream received! Tracks:', remoteStream.getTracks().length);

        const vid = document.getElementById('video');
        vid.srcObject = remoteStream;
        vid.play().catch(e => console.warn('play():', e));

        document.getElementById('overlay').classList.add('hidden');
        bc?.postMessage({ type: 'live' });
      });

      call.on('close', () => {
        console.log('[Viewer] Call ended');
        document.getElementById('video').srcObject = null;
        document.getElementById('overlay').classList.remove('hidden');
        setStatus('Camera stopped…', 'waiting');
        bc?.postMessage({ type: 'waiting' });
        activeCall = null;
      });

      call.on('error', (err) => {
        console.warn('[Viewer] Call error:', err);
        document.getElementById('video').srcObject = null;
        document.getElementById('overlay').classList.remove('hidden');
        setStatus('Stream error, waiting…', 'waiting');
        activeCall = null;
      });
    });

    // Handle peer errors — retry registering after backoff
    viewerPeer.on('error', (err) => {
      console.warn('[Viewer] Peer error:', err.type, err.message);

      if (err.type === 'unavailable-id') {
        // Old viewer session still registered on PeerJS — wait and retry
        retryCount++;
        const delay = Math.min(retryCount * 4, 20);
        setStatus(`Session busy, retrying in ${delay}s…`, 'retrying');
        retryTimer = setTimeout(startViewer, delay * 1000);
      } else if (['network','server-error','socket-error'].includes(err.type)) {
        setStatus('Connection lost, retrying…', 'retrying');
        retryTimer = setTimeout(startViewer, 5000);
      } else {
        // Other errors (peer-unavailable shouldn't happen since we wait for camera to call us)
        setStatus(`Error: ${err.type}`, 'error');
        retryTimer = setTimeout(startViewer, 6000);
      }
    });

    viewerPeer.on('disconnected', () => {
      setStatus('Reconnecting…', 'retrying');
      setTimeout(() => {
        if (viewerPeer && !viewerPeer.destroyed) viewerPeer.reconnect();
      }, 2000);
    });
  }

  function setStatus(msg, state) {
    document.getElementById('overlayTitle').textContent =
      state === 'ready'    ? 'Waiting for camera…' :
      state === 'retrying' ? 'Reconnecting…' :
      state === 'error'    ? 'Connection error' :
      msg;
    document.getElementById('statusBadge').textContent = msg;
  }
</script>
</body>
</html>
